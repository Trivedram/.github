name: 🐞 Bug Report
description: Report a bug to help us improve Trivedram.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Trivedram!

        Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened?
      placeholder: A clear and concise description...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: If applicable, add screenshots or logs.

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows 11 / Ubuntu 24.04 / macOS

  - type: input
    id: version
    attributes:
      label: Project Version
      placeholder: v1.0.0

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: Anything else we should know?